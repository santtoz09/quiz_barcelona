<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Barcelona</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="tela-login" class="tela ativa">
        <div class="cartao-login">
          <img class="escudo escudo-login" src="barcelona.png" alt="Escudo do Barcelona" />
          <h1>QUIZ BARCELONA</h1>
          <form id="form-login" class="form-login">
            <label for="nomeJogador">Digite seu nome</label>
            <input id="nomeJogador" name="nomeJogador" type="text" maxlength="30" autocomplete="name" required />
            <button class="botao-principal botao-login" type="submit">Entrar</button>
          </form>
        </div>
      </section>

      <section id="tela-inicio" class="tela">
        <div class="texto-inicio">
          <h1>QUIZ</h1>
          <p>BARCELONA</p>
        </div>

        <img class="escudo escudo-inicio" src="barcelona.png" alt="Escudo do Barcelona" />
        <div class="faixa-jogador">Jogador: <span id="nomeJogadorAtual"></span></div>
        <button id="botao-iniciar" class="botao-principal" type="button">Iniciar quiz</button>
      </section>

      <section id="tela-quiz" class="tela">
        <div id="caixa-pergunta" class="caixa-pergunta">
          <div class="area-pergunta">
            <div class="info-quiz">
              <p id="contador-pergunta" class="contador"></p>
              <p id="texto-tempo" class="contador tempo">Tempo: 00:00</p>
            </div>
            <h2 id="titulo-pergunta"></h2>
            <div id="respostas" class="respostas"></div>
          </div>

          <img class="escudo escudo-quiz" src="barcelona.png" alt="Escudo do Barcelona" />
        </div>

        <div class="barra-progresso">
          <div id="preenchimento-progresso"></div>
        </div>
      </section>

      <section id="tela-resultado" class="tela">
        <img class="escudo escudo-resultado" src="barcelona.png" alt="Escudo do Barcelona" />

        <div class="texto-resultado">
          <h2>PARABÉNS</h2>
          <p>SUA PONTUAÇÃO FOI:</p>
          <strong id="texto-pontuacao">0/5</strong>
          <span id="texto-tempo-final" class="tempo-final">Tempo: 00:00</span>

          <div class="cartao-ranking">
            <h3>Ranking</h3>
            <ol id="lista-ranking" class="lista-ranking"></ol>
          </div>

          <button id="botao-reiniciar" class="botao-principal botao-pequeno" type="button">Jogar novamente</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
